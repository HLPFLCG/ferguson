name = "manzanillo-lat"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = ".vercel/output/static"

# Cloudflare KV namespace for booking storage
# Create a KV namespace in the Cloudflare dashboard and paste its ID below
[[kv_namespaces]]
binding = "BOOKINGS_KV"
id = "YOUR_CLOUDFLARE_KV_NAMESPACE_ID_HERE"
